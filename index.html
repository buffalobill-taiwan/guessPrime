<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="screen-orientation" content="portrait">
    <title>猜質數</title>
    <link rel="stylesheet" href="css/uikit.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="uk-container">
        <div class="header">
            <div class="bits"><span id="bits">8</span> Bits</div>

        </div>

        <div class="number-display" id="number">載入中...</div>

        <div class="buttons" id="buttons">
            <button class="btn-yes" id="btn-yes">是質數</button>
            <button class="btn-no" id="btn-no">不是質數</button>
        </div>

        <div class="result" id="result">
            <div class="message" id="message"></div>
            <div class="factor" id="factor"></div>
            <button class="next-btn" id="btn-next">下一題</button>
        </div>
    </div>

    <script src="js/math-utils.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
